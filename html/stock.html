<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KioscOK | Inventario</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header><span>📦 CONTROL DE INVENTARIO</span></header>
    <div class="nav-buttons">
        <button class="btn-white" onclick="abrirModalProducto()">➕ AGREGAR PRODUCTO</button>
        <button class="btn-white" id="btnEditar" onclick="editarProducto()" disabled>✏️ MODIFICAR</button>
        <button class="btn-red" id="btnBorrar" onclick="borrarProducto()" disabled>🗑️ ELIMINAR</button>
        <button class="btn-blue" onclick="location.href='index.html'">🏠 VOLVER</button>
    </div>
    <div class="container">
        <div class="card">
            <table>
                <thead><tr><th>Código</th><th>Descripción</th><th>Marca</th><th>Stock</th><th>Venta</th></tr></thead>
                <tbody id="bodyStock"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Producto -->
    <div id="modalProducto" class="modal">
        <div class="modal-content">
            <h3 id="tituloModalProd">Nuevo Producto</h3>
            <form id="formProducto">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div class="form-group"><label>Código</label><input type="text" id="p_cod" class="form-control" required></div>
                    <div class="form-group"><label>Descripción</label><input type="text" id="p_desc" class="form-control" required></div>
                    <div class="form-group"><label>Marca</label><input type="text" id="p_marca" class="form-control" required></div>
                    <div class="form-group"><label>Stock Inicial</label><input type="number" id="p_stock" class="form-control" required></div>
                    <div class="form-group"><label>Precio Venta</label><input type="number" step="0.01" id="p_venta" class="form-control" required></div>
                </div>
                <div style="margin-top:20px; display:flex; gap:10px; justify-content:flex-end;">
                    <button type="button" class="btn-white" onclick="cerrarModalProd()">Cancelar</button>
                    <button type="submit" class="btn-green">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/app.js"></script>
    <script src="../js/inventario.js"></script>
</body>
</html>
