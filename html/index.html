<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KioscOK | Punto de Venta</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header><span>🛒 KioscOK 1.0.0</span></header>
    <div class="nav-buttons">
        <button class="btn-blue" onclick="abrirModalVenta()">➕ NUEVA VENTA</button>
        <button class="btn-white" onclick="location.href='stock.html'">📦 STOCK</button>
        <button class="btn-white" onclick="location.href='caja.html'">💰 CAJA</button>
    </div>
    <div class="container">
        <div class="card">
            <h3>Últimas Ventas</h3>
            <table>
                <thead><tr><th>Fecha/Hora</th><th>Productos</th><th>Total</th><th>Pago</th></tr></thead>
                <tbody id="listaVentasHistorial"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Venta -->
    <div id="modalVenta" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <h3>Terminal de Venta</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <div class="form-group">
                        <label>Seleccionar Producto</label>
                        <select id="selectProductoPOS" class="form-control"></select>
                    </div>
                    <div class="form-group">
                        <label>Cantidad</label>
                        <input type="number" id="cantProductoPOS" value="1" min="1" class="form-control">
                    </div>
                    <button class="btn-blue" style="width: 100%;" onclick="agregarAlCarrito()">Agregar ➕</button>
                </div>
                <div style="background:#f8fafc; padding:15px; border-radius:12px;">
                    <h4>Carrito</h4>
                    <div id="renderCarrito" style="height:150px; overflow-y:auto; margin-bottom:10px;"></div>
                    <h2 id="totalVentaModal" style="margin:10px 0;">$ 0.00</h2>
                    <select id="metodoPagoPOS" class="form-control" style="margin-bottom:10px;">
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                    <button class="btn-green" style="width:100%; padding:15px;" onclick="finalizarVenta()">COBRAR</button>
                    <button class="btn-white" style="width:100%; margin-top:10px;" onclick="cerrarModalVenta()">Cerrar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
