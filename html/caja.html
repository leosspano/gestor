<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KioscOK | Caja</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <span>💰 GESTIÓN DE FINANZAS</span>
        <!-- BOTÓN VOLVER AGREGADO AQUÍ -->
        <button class="btn-blue" onclick="location.href='index.html'">🏠 VOLVER AL PANEL</button>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><small>Saldo Global</small><b id="txtSaldoGlobal">$ 0.00</b></div>
            <div class="stat-card"><small>Resultado Día</small><b id="txtMontoDia">$ 0.00</b></div>
            <div class="stat-card"><small>Estado Caja</small><b id="txtEstadoCaja">CONSULTANDO...</b></div>
        </div>

        <div class="card" style="display:flex; gap:15px; align-items:center;">
            <div style="display:flex; align-items:center; gap:10px;">
                <span>Fecha:</span>
                <input type="date" id="inputFechaCaja" class="form-control" style="width:auto;" onchange="actualizarInterfazCaja()">
            </div>
            <button class="btn-green" onclick="cambiarEstadoCaja('abierta')">🔓 Abrir Caja</button>
            <button class="btn-red" onclick="cambiarEstadoCaja('cerrada')">🔒 Cerrar Caja</button>
        </div>

        <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px;">
            <div class="card">
                <h4>Movimientos</h4>
                <table>
                    <thead>
                        <tr><th>Hora</th><th>Tipo</th><th>Detalle</th><th>Monto</th><th>Acción</th></tr>
                    </thead>
                    <tbody id="listaMovimientos"></tbody>
                </table>
            </div>
            <div class="card">
                <h4>Acciones Manuales</h4>
                <button class="btn-blue" style="width:100%; margin-bottom:12px; padding:15px;" onclick="abrirModalMov('Ingreso')">💰 Registrar Ingreso</button>
                <button class="btn-red" style="width:100%; padding:15px;" onclick="abrirModalMov('Egreso')">💸 Registrar Egreso</button>
            </div>
        </div>
    </div>

    <!-- MODAL MOVIMIENTO (Ingreso/Egreso) -->
    <div id="modalMov" class="modal">
        <div class="modal-content">
            <h3 id="tituloModalMov">Nuevo Registro</h3>
            <form id="formMov">
                <input type="hidden" id="mov_tipo">
                <div class="form-group">
                    <label>Descripción / Motivo</label>
                    <input type="text" id="mov_desc" class="form-control" placeholder="Ej: Pago de luz, Venta mayorista..." required>
                </div>
                <div class="form-group">
                    <label>Monto ($)</label>
                    <input type="number" step="0.01" id="mov_monto" class="form-control" required>
                </div>
                <div style="margin-top:20px; display:flex; gap:10px; justify-content:flex-end;">
                    <button type="button" class="btn-white" onclick="cerrarModalMov()">Cancelar</button>
                    <button type="submit" class="btn-green">Guardar Registro</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/caja.js"></script>
</body>
</html>
